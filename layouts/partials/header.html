<header class="site-header">
  <div class="header-inner">
    <a href="{{ "/" | relURL }}" class="site-title">🌍 Good News</a>
    <nav class="main-nav">
      {{ range .Site.Menus.main }}
        <a href="{{ .URL }}"{{ if $.IsMenuCurrent "main" . }} class="active"{{ end }}>{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
